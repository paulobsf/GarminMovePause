name: Bug report
description: Report a reproducible bug or device-specific behaviour.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: watch_model
    attributes:
      label: Watch model
      description: Example device is Forerunner 265.
      placeholder: Forerunner 265
    validations:
      required: true

  - type: input
    id: firmware_version
    attributes:
      label: Firmware version
      description: Include the watch firmware version if you know it.
      placeholder: 20.32
    validations:
      required: false

  - type: input
    id: activity_type
    attributes:
      label: Activity type
      description: Example activity is Run, Trail Run, or Treadmill Run.
      placeholder: Run
    validations:
      required: true

  - type: dropdown
    id: auto_pause
    attributes:
      label: Auto Pause
      options:
        - Enabled
        - Disabled
        - Not sure
    validations:
      required: true

  - type: textarea
    id: activity_settings
    attributes:
      label: Relevant activity settings
      description: Include timer, Auto Pause, screen, or other settings that may matter.
      placeholder: Auto Pause enabled, 1-second recording, default run profile
    validations:
      required: false

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: List the steps needed to reproduce the behaviour.
      placeholder: |
        1. Start a run activity
        2. Pause manually after 2 minutes
        3. Resume after 30 seconds
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: Expected result
      placeholder: The pause duration should continue counting only while the activity is paused.
    validations:
      required: true

  - type: textarea
    id: actual_result
    attributes:
      label: Actual result
      placeholder: The paused total increased after the activity resumed.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or photos
      description: Optional. Add simulator screenshots or watch photos if they help explain the issue.
    validations:
      required: false
